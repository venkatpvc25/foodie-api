
spring:
  application: entireprise-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/foodie
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}

server:
  port: 8080

app:
  admin:
    enabled: ${APP_ADMIN_ENABLED:true}
    email: ${APP_ADMIN_EMAIL:admin@yourapp.com}
    password: ${APP_ADMIN_PASSWORD:admin@123}
  auth:
    restaurant-signup-enabled: ${APP_RESTAURANT_SIGNUP_ENABLED:false}
    delivery-partner-signup-enabled: ${APP_DELIVERY_PARTNER_SIGNUP_ENABLED:true}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  docs:
    public-enabled: ${APP_DOCS_PUBLIC_ENABLED:false}
  guest-checkout:
    otp:
      ttl-seconds: ${APP_GUEST_CHECKOUT_OTP_TTL_SECONDS:300}
      max-attempts: ${APP_GUEST_CHECKOUT_OTP_MAX_ATTEMPTS:5}
      debug-response-enabled: ${APP_GUEST_CHECKOUT_OTP_DEBUG_RESPONSE_ENABLED:true}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    login:
      max-requests: ${APP_RATE_LIMIT_LOGIN_MAX_REQUESTS:10}
      window-seconds: ${APP_RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
    refresh:
      max-requests: ${APP_RATE_LIMIT_REFRESH_MAX_REQUESTS:30}
      window-seconds: ${APP_RATE_LIMIT_REFRESH_WINDOW_SECONDS:60}
    signup:
      max-requests: ${APP_RATE_LIMIT_SIGNUP_MAX_REQUESTS:5}
      window-seconds: ${APP_RATE_LIMIT_SIGNUP_WINDOW_SECONDS:3600}
    otp-ip:
      max-requests: ${APP_RATE_LIMIT_OTP_IP_MAX_REQUESTS:5}
      window-seconds: ${APP_RATE_LIMIT_OTP_IP_WINDOW_SECONDS:900}
    otp-phone:
      max-requests: ${APP_RATE_LIMIT_OTP_PHONE_MAX_REQUESTS:5}
      window-seconds: ${APP_RATE_LIMIT_OTP_PHONE_WINDOW_SECONDS:900}
  notifications:
    provider: ${APP_NOTIFICATIONS_PROVIDER:log}
    firebase:
      enabled: ${FIREBASE_ENABLED:true}
      service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:/home/venkat/git/food-order/firebase-service-account.json}
      app-name: ${FIREBASE_APP_NAME:foodie}
  payments:
    commission-rate: ${APP_PAYMENT_COMMISSION_RATE:0.10}
    admin-razorpay-account-id: ${APP_ADMIN_RAZORPAY_ACCOUNT_ID:}
    razorpay:
      enabled: ${RAZORPAY_ENABLED:true}
      key-id: ${RAZORPAY_KEY_ID:rzp_test_T5MqxLWxy3k1xP}
      key-secret: ${RAZORPAY_KEY_SECRET:bQq9xmXIUhdE3rOUIB8jGm70}
      currency: ${RAZORPAY_CURRENCY:INR}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-local-development-only-32-chars-minimum}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true

info:
  app:
    name: Enterprise Backend
    version: 1.0.0
    description: Production-ready SaaS backend

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    operationsSorter: method
