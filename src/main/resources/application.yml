
spring:
  application: entireprise-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/foodie
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}

server:
  port: 8080

app:
  admin:
    enabled: ${APP_ADMIN_ENABLED:false}
    email: ${APP_ADMIN_EMAIL:admin@yourapp.com}
    password: ${APP_ADMIN_PASSWORD:change-me-before-enable}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  notifications:
    provider: ${APP_NOTIFICATIONS_PROVIDER:log}
    firebase:
      enabled: ${FIREBASE_ENABLED:false}
      service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
      app-name: ${FIREBASE_APP_NAME:foodie}
  payments:
    commission-rate: ${APP_PAYMENT_COMMISSION_RATE:0.10}
    admin-razorpay-account-id: ${APP_ADMIN_RAZORPAY_ACCOUNT_ID:}
    razorpay:
      enabled: ${RAZORPAY_ENABLED:true}
      key-id: ${RAZORPAY_KEY_ID:rzp_test_T5MqxLWxy3k1xP}
      key-secret: ${RAZORPAY_KEY_SECRET:bQq9xmXIUhdE3rOUIB8jGm70}
      currency: ${RAZORPAY_CURRENCY:INR}

jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-local-development-only-32-chars-minimum}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true

info:
  app:
    name: Enterprise Backend
    version: 1.0.0
    description: Production-ready SaaS backend

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
