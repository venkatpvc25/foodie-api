services:
  postgres:
    image: postgres:16-alpine
    container_name: foodie-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foodie}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or shell}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - foodie_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foodie-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-foodie}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or shell}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env or shell}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      RAZORPAY_ENABLED: ${RAZORPAY_ENABLED:-false}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      APP_ADMIN_ENABLED: ${APP_ADMIN_ENABLED:-false}
      APP_RESTAURANT_SIGNUP_ENABLED: ${APP_RESTAURANT_SIGNUP_ENABLED:-false}
      APP_DELIVERY_PARTNER_SIGNUP_ENABLED: ${APP_DELIVERY_PARTNER_SIGNUP_ENABLED:-false}
      APP_GUEST_CHECKOUT_OTP_DEBUG_RESPONSE_ENABLED: ${APP_GUEST_CHECKOUT_OTP_DEBUG_RESPONSE_ENABLED:-false}
      APP_RATE_LIMIT_ENABLED: ${APP_RATE_LIMIT_ENABLED:-true}
      APP_DOCS_PUBLIC_ENABLED: "false"
      SPRINGDOC_API_DOCS_ENABLED: "false"
      SPRINGDOC_SWAGGER_UI_ENABLED: "false"
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  foodie_postgres_data:
